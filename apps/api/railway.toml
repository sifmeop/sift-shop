[build]
builder = "nixpacks"

[build.nixpacksPlan]
phases = ["setup", "install", "build"]

[build.nixpacksPlan.setup]
nixPkgs = ["...", "bun"]

[build.nixpacksPlan.install]
cmds = ["cd ../.. && bun install"]

[build.nixpacksPlan.build]
cmds = ["bun run build"]

[deploy]
startCommand = "bun run start:prod"